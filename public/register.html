<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Movie Ticket | Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap");

      body {
        font-family: "Outfit", sans-serif;
      }
    </style>
  </head>
  <body
    class="min-h-screen bg-gradient-to-tr from-slate-900 via-slate-800 to-slate-900 text-slate-100 flex items-center justify-center px-4 py-8"
  >
    <div
      class="w-full max-w-lg bg-slate-800/80 backdrop-blur-xl rounded-3xl border border-slate-700/50 shadow-2xl p-8"
    >
      <h1
        class="text-3xl font-bold text-center text-transparent bg-clip-text bg-gradient-to-r from-emerald-300 to-cyan-300"
      >
        Create Account
      </h1>
      <p class="text-slate-400 text-center mt-2">
        Register and start booking seats
      </p>

      <p
        id="errorBox"
        class="hidden mt-4 p-3 rounded-xl bg-red-500/20 border border-red-500/40 text-red-200 text-sm"
      ></p>
      <p
        id="successBox"
        class="hidden mt-4 p-3 rounded-xl bg-emerald-500/20 border border-emerald-500/40 text-emerald-200 text-sm"
      ></p>

      <form id="registerForm" class="mt-6 space-y-4">
        <input
          type="text"
          name="first_name"
          placeholder="First name"
          required
          minlength="3"
          class="w-full p-3 rounded-xl bg-slate-700 border border-slate-600 outline-none focus:border-emerald-400"
        />
        <input
          type="text"
          name="last_name"
          placeholder="Last name (optional)"
          class="w-full p-3 rounded-xl bg-slate-700 border border-slate-600 outline-none focus:border-emerald-400"
        />
        <input
          type="email"
          name="email"
          placeholder="Email"
          required
          class="w-full p-3 rounded-xl bg-slate-700 border border-slate-600 outline-none focus:border-emerald-400"
        />
        <input
          type="password"
          name="password"
          placeholder="Password"
          required
          minlength="6"
          class="w-full p-3 rounded-xl bg-slate-700 border border-slate-600 outline-none focus:border-emerald-400"
        />
        <button
          type="submit"
          class="w-full p-3 rounded-xl bg-emerald-500 text-slate-900 font-semibold hover:bg-emerald-400 transition"
        >
          Register
        </button>
      </form>

      <div class="mt-6 flex items-center justify-between text-sm">
        <a href="/index.html" class="text-slate-300 hover:text-white"
          >Back to Seats</a
        >
        <a href="/login.html" class="text-cyan-300 hover:text-cyan-200"
          >Already have an account?</a
        >
      </div>
    </div>

    <script>
      const form = document.getElementById("registerForm");
      const errorBox = document.getElementById("errorBox");
      const successBox = document.getElementById("successBox");

      function showError(message) {
        successBox.classList.add("hidden");
        errorBox.textContent = message;
        errorBox.classList.remove("hidden");
      }

      function showSuccess(message) {
        errorBox.classList.add("hidden");
        successBox.textContent = message;
        successBox.classList.remove("hidden");
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        errorBox.classList.add("hidden");
        successBox.classList.add("hidden");

        const formData = new FormData(form);
        const body = {
          first_name: formData.get("first_name"),
          last_name: formData.get("last_name") || "",
          email: formData.get("email"),
          password: formData.get("password"),
        };

        try {
          const res = await fetch("/auth/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });

          const payload = await res.json();

          if (!res.ok || !payload.success) {
            showError(payload.message || "Registration failed");
            return;
          }

          showSuccess("Registration successful. Redirecting to login...");
          setTimeout(() => {
            window.location.href = "/login.html";
          }, 900);
        } catch (error) {
          showError("Unable to register. Please try again.");
        }
      });
    </script>
  </body>
</html>
