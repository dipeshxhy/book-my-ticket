<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Movie Ticket | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap");

      body {
        font-family: "Outfit", sans-serif;
      }
    </style>
  </head>
  <body
    class="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 text-slate-100 flex items-center justify-center px-4"
  >
    <div
      class="w-full max-w-md bg-slate-800/80 backdrop-blur-xl rounded-3xl border border-slate-700/50 shadow-2xl p-8"
    >
      <h1
        class="text-3xl font-bold text-center text-transparent bg-clip-text bg-gradient-to-r from-cyan-300 to-emerald-300"
      >
        Login
      </h1>
      <p class="text-slate-400 text-center mt-2">Login to book your seat</p>

      <p
        id="errorBox"
        class="hidden mt-4 p-3 rounded-xl bg-red-500/20 border border-red-500/40 text-red-200 text-sm"
      ></p>

      <form id="loginForm" class="mt-6 space-y-4">
        <input
          type="email"
          name="email"
          placeholder="Email"
          required
          class="w-full p-3 rounded-xl bg-slate-700 border border-slate-600 outline-none focus:border-cyan-400"
        />
        <input
          type="password"
          name="password"
          placeholder="Password"
          required
          minlength="6"
          class="w-full p-3 rounded-xl bg-slate-700 border border-slate-600 outline-none focus:border-cyan-400"
        />
        <button
          type="submit"
          class="w-full p-3 rounded-xl bg-cyan-500 text-slate-900 font-semibold hover:bg-cyan-400 transition"
        >
          Login
        </button>
      </form>

      <div class="mt-6 flex items-center justify-between text-sm">
        <a href="/index.html" class="text-slate-300 hover:text-white"
          >Back to Seats</a
        >
        <a href="/register.html" class="text-emerald-300 hover:text-emerald-200"
          >Create account</a
        >
      </div>
    </div>

    <script>
      const form = document.getElementById("loginForm");
      const errorBox = document.getElementById("errorBox");

      function showError(message) {
        errorBox.textContent = message;
        errorBox.classList.remove("hidden");
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        errorBox.classList.add("hidden");

        const formData = new FormData(form);
        const body = {
          email: formData.get("email"),
          password: formData.get("password"),
        };

        try {
          const res = await fetch("/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });

          const payload = await res.json();

          if (!res.ok || !payload.success) {
            showError(payload.message || "Login failed");
            return;
          }

          window.location.href = "/index.html";
        } catch (error) {
          showError("Unable to login. Please try again.");
        }
      });
    </script>
  </body>
</html>
